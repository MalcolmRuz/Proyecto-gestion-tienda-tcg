spring:
  application:
    name: PEDIDO-SERVICE

  datasource:
    url: jdbc:mysql://pedido-db:3306/pedido
    username: pedido_user
    password: pedido_pass
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8084

eureka:
  client:
    service-url:
      defaultZone: http://eureka:8761/eureka/

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
